spring.application.name=safetrade-backend

# Database Connection URL (localhost, default port 5432, database name demo)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/safetrade

# Your Postgres username and password
spring.datasource.username=postgres
spring.datasource.password=password

# Tell Hibernate to use the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CRITICAL FOR TESTING: This automatically creates/updates your tables based on your Java Classes!
spring.jpa.hibernate.ddl-auto=update

# Optional: Show the SQL queries in your console so you can see what Spring is doing
spring.jpa.show-sql=true

# Paystack API configuration
paystack.secret.key=pk_test_mock_key_123456

# Disable Spring Session (we are using JWT) - no need to set store-type since spring-session isn't included